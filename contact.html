<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | QuickCards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="scanlines"></div>

  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="logo.png" alt="QuickCards" class="logo-img">
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#products" class="nav-link">Products</a>
        <a href="index.html#categories" class="nav-link">Categories</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </div>
      <div class="nav-actions">
        <a href="https://www.ebay.com/str/qceshop" target="_blank" class="btn-ebay">
          <span>Visit eBay Store</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
        </a>
        <button class="mobile-toggle" id="mobileToggle">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Contact Content -->
  <section style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 120px 24px 60px;">
    <div style="text-align: center; max-width: 600px;">
      <h1 style="font-family: 'Orbitron', monospace; font-size: 2rem; margin-bottom: 16px;">Contact Us</h1>
      <p style="color: var(--gray-300); font-size: 1.1rem;">Contact details coming soon.</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 QuickCards.shop &mdash; All Rights Reserved</p>
      </div>
    </div>
  </footer>

  <script>
    // Mobile nav toggle
    document.getElementById('mobileToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });
    // Particles (minimal)
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
  </script>
</body>
</html>
